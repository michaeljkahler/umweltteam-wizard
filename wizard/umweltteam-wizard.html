<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umweltteam-Wizard | Assistant Équipe Environnement</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --green-dark: #2d6a4f;
    --green-mid: #40916c;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --green-bg: #d8f3dc;
    --accent: #f77f00;
    --accent-light: #fcbf49;
    --text: #1b4332;
    --text-light: #555;
    --bg: #f8faf9;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --red: #c33;
    --orange: #f77f00;
    --yellow: #ffc107;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header with save/load buttons */
  .header {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    color: white;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .header h1 { font-size: 1.4rem; display:flex; align-items:center; gap:.5rem; }
  .header-actions {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .save-load-buttons {
    display: flex;
    gap: .5rem;
  }
  .icon-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    color: white;
    padding: .5rem .8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    transition: all .2s;
    font-weight: 600;
  }
  .icon-btn:hover {
    background: rgba(255,255,255,0.3);
    border-color: white;
  }
  .lang-toggle {
    display: flex; gap: .5rem;
  }
  .lang-btn {
    padding: .4rem .8rem;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 6px;
    background: transparent;
    color: white;
    cursor: pointer;
    font-weight: 600;
    font-size: .85rem;
    transition: all .2s;
  }
  .lang-btn.active {
    background: white;
    color: var(--green-dark);
    border-color: white;
  }

  /* Progress */
  .progress-bar {
    display: flex;
    justify-content: center;
    padding: 1.5rem 1rem;
    gap: .3rem;
    background: white;
    border-bottom: 1px solid var(--green-pale);
    overflow-x: auto;
  }
  .step-dot {
    display: flex;
    align-items: center;
    gap: .3rem;
    font-size: .75rem;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .step-dot .dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--green-pale);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: .8rem;
    color: var(--green-dark);
    transition: all .3s;
  }
  .step-dot.active .dot {
    background: var(--green-mid);
    color: white;
    transform: scale(1.15);
  }
  .step-dot.completed .dot {
    background: var(--green-dark);
    color: white;
  }
  .step-line {
    width: 30px; height: 2px;
    background: var(--green-pale);
    align-self: center;
    flex-shrink: 0;
  }
  .step-dot.completed + .step-line,
  .step-line.done { background: var(--green-dark); }

  /* Project selector bar */
  .project-selector-bar {
    background: white;
    border-bottom: 2px solid var(--green-pale);
    padding: .8rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: .9rem;
  }
  .project-selector-bar label {
    font-weight: 600;
    color: var(--text);
  }
  .project-selector-bar select {
    padding: .4rem .6rem;
    border: 2px solid var(--green-pale);
    border-radius: 6px;
    font-size: .9rem;
  }
  .project-selector-bar .btn-small {
    padding: .4rem .8rem;
  }

  /* Main */
  .main {
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; transform:translateY(0); }
  }
  .card h2 {
    font-size: 1.3rem;
    color: var(--green-dark);
    margin-bottom: .5rem;
  }
  .card .subtitle {
    color: var(--text-light);
    font-size: .9rem;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .hint {
    background: var(--green-bg);
    border-left: 4px solid var(--green-mid);
    padding: .8rem;
    margin-bottom: 1rem;
    border-radius: 4px;
    font-size: .9rem;
    color: var(--text);
  }

  /* Form elements */
  .form-group {
    margin-bottom: 1.2rem;
  }
  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: .4rem;
    font-size: .9rem;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
  }
  input[type="text"], input[type="number"], input[type="email"], input[type="date"], textarea, select {
    width: 100%;
    padding: .6rem .8rem;
    border: 2px solid var(--green-pale);
    border-radius: 8px;
    font-size: .9rem;
    font-family: inherit;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--green-mid);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* Checkbox grid */
  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .6rem;
  }
  @media (max-width: 600px) {
    .checkbox-grid { grid-template-columns: 1fr; }
  }
  .checkbox-item {
    display: flex;
    align-items: flex-start;
    gap: .5rem;
    padding: .7rem;
    border: 2px solid var(--green-pale);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    font-size: .85rem;
    line-height: 1.4;
  }
  .checkbox-item:hover { border-color: var(--green-light); background: var(--green-bg); }
  .checkbox-item.checked {
    border-color: var(--green-mid);
    background: var(--green-bg);
  }
  .checkbox-item input { margin-top: 2px; accent-color: var(--green-mid); }
  .checkbox-item .cb-label { font-weight: 600; }
  .checkbox-item .cb-desc { font-size: .8rem; color: var(--text-light); }

  /* Radio options */
  .radio-group { display:flex; flex-direction:column; gap:.5rem; }
  .radio-item {
    display: flex;
    align-items: flex-start;
    gap: .6rem;
    padding: .8rem 1rem;
    border: 2px solid var(--green-pale);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .radio-item:hover { border-color: var(--green-light); }
  .radio-item.selected {
    border-color: var(--green-mid);
    background: var(--green-bg);
  }
  .radio-item input { accent-color: var(--green-mid); margin-top: 2px; }
  .radio-item > div { flex: 1; }

  /* Buttons */
  .btn-row {
    display: flex;
    justify-content: space-between;
    margin-top: 1.5rem;
    gap: 1rem;
  }
  .btn {
    padding: .7rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--green-mid);
    color: white;
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-secondary {
    background: var(--green-pale);
    color: var(--green-dark);
  }
  .btn-secondary:hover { background: var(--green-light); color: white; }
  .btn-accent {
    background: var(--accent);
    color: white;
  }
  .btn-accent:hover { background: #e06f00; }
  .btn-danger {
    background: #fee;
    color: var(--red);
    border: 2px solid var(--red);
  }
  .btn-danger:hover { background: #fdd; }
  .btn-small {
    padding: .4rem .8rem;
    font-size: .8rem;
  }
  .btn-icon {
    padding: .4rem .6rem;
    font-size: .75rem;
  }

  /* Project cards */
  .project-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  .project-card {
    background: white;
    border: 2px solid var(--green-pale);
    border-radius: 8px;
    padding: 1.5rem;
    transition: all .2s;
  }
  .project-card:hover {
    border-color: var(--green-mid);
    box-shadow: var(--shadow);
  }
  .project-card h3 {
    font-size: 1rem;
    color: var(--green-dark);
    margin-bottom: .5rem;
  }
  .project-card .status {
    font-size: .85rem;
    color: var(--text-light);
    margin-bottom: 1rem;
  }
  .project-card-actions {
    display: flex;
    gap: .5rem;
    margin-top: 1rem;
  }
  .project-card-actions .btn {
    flex: 1;
    padding: .5rem .6rem;
    font-size: .8rem;
  }

  /* Jahresplan */
  .timeline {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: .5rem;
  }
  @media (max-width: 600px) {
    .timeline { grid-template-columns: repeat(2, 1fr); }
  }
  .month-card {
    border: 2px solid var(--green-pale);
    border-radius: 8px;
    padding: .5rem;
    min-height: 80px;
    transition: all .2s;
  }
  .month-card.drag-over {
    background: var(--green-bg);
    border-color: var(--green-mid);
  }
  .month-card .month-name {
    font-weight: 700;
    font-size: .75rem;
    color: var(--green-dark);
    margin-bottom: .3rem;
    text-transform: uppercase;
  }
  .month-card textarea {
    width: 100%;
    border: none;
    font-size: .75rem;
    resize: none;
    min-height: 50px;
    font-family: inherit;
    padding: .2rem;
  }
  .month-card textarea:focus { outline: 1px solid var(--green-light); border-radius:4px; }

  /* Chips */
  .activity-chips {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--green-bg);
    border-radius: 8px;
    min-height: 40px;
  }
  .chip {
    padding: .4rem .8rem;
    background: white;
    border: 2px solid var(--green-light);
    border-radius: 16px;
    font-size: .8rem;
    cursor: grab;
    user-select: none;
    transition: all .2s;
  }
  .chip:active { cursor: grabbing; }
  .chip:hover { background: var(--green-light); color: white; }

  /* Tables */
  .table-wrapper {
    overflow-x: auto;
    margin: 1rem 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .9rem;
  }
  table thead {
    background: var(--green-bg);
    border: 2px solid var(--green-pale);
  }
  table th {
    padding: .6rem .8rem;
    text-align: left;
    font-weight: 600;
    color: var(--green-dark);
  }
  table td {
    padding: .6rem .8rem;
    border-bottom: 1px solid var(--green-pale);
  }
  table tbody tr:hover {
    background: var(--green-bg);
  }
  table input, table select {
    border: 1px solid var(--green-pale);
    padding: .4rem .6rem;
    font-size: .85rem;
    width: 100%;
  }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: .3rem .8rem;
    border-radius: 4px;
    font-size: .75rem;
    font-weight: 600;
  }
  .badge-offen {
    background: #fee;
    color: #c33;
  }
  .badge-arbeit {
    background: #fef3cd;
    color: #856404;
  }
  .badge-erledigt {
    background: var(--green-bg);
    color: var(--green-dark);
  }

  /* Gantt */
  .gantt-container {
    margin-top: 1.5rem;
    overflow-x: auto;
  }
  .gantt-chart {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: .5rem;
    min-width: 1100px;
  }
  .gantt-labels {
    display: flex;
    flex-direction: column;
  }
  .gantt-label {
    height: 40px;
    display: flex;
    align-items: center;
    font-weight: 600;
    font-size: .85rem;
    padding-right: 1rem;
    border-bottom: 1px solid var(--green-pale);
    word-break: break-word;
  }
  .gantt-bars {
    display: flex;
    flex-direction: column;
  }
  .gantt-row {
    height: 40px;
    display: grid;
    grid-template-columns: repeat(52, minmax(16px, 1fr));
    border-bottom: 1px solid var(--green-pale);
    position: relative;
    align-items: center;
  }
  .gantt-bar {
    border-radius: 4px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .7rem;
    color: white;
    font-weight: 600;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding: 0 .3rem;
  }
  .gantt-month-header {
    display: grid;
    grid-template-columns: repeat(52, minmax(16px, 1fr));
    font-weight: 600;
    font-size: .7rem;
    color: var(--green-dark);
    margin-bottom: .5rem;
  }
  .gantt-month-header div {
    text-align: center;
    border-bottom: 1px solid var(--green-pale);
    padding-bottom: .2rem;
  }
  .gantt-month-group {
    display: flex;
    gap: .1rem;
    flex: 1;
  }
  .gantt-month-group-label {
    font-weight: 700;
    font-size: .8rem;
    color: var(--green-dark);
    padding: .3rem .5rem;
    background: var(--green-bg);
    border-radius: 4px;
  }
  .color-palette {
    display: flex;
    gap: .5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    font-size: .8rem;
  }
  .color-item {
    display: flex;
    align-items: center;
    gap: .3rem;
  }
  .color-dot {
    width: 16px;
    height: 16px;
    border-radius: 3px;
  }

  /* Summary */
  .summary-section {
    margin-bottom: 1.5rem;
  }
  .summary-section h3 {
    font-size: 1rem;
    color: var(--green-dark);
    border-bottom: 2px solid var(--green-pale);
    padding-bottom: .3rem;
    margin-bottom: .6rem;
  }
  .summary-list {
    list-style: none;
    padding: 0;
  }
  .summary-list li {
    padding: .3rem 0;
    padding-left: 1.2rem;
    position: relative;
    font-size: .9rem;
  }
  .summary-list li::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--green-mid);
    font-weight: bold;
  }

  /* Export buttons */
  .export-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .export-dropdown {
    display: flex;
    gap: .5rem;
    align-items: center;
  }
  .export-dropdown select {
    padding: .6rem .8rem;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal.active {
    display: flex;
  }
  .modal-content {
    background: white;
    padding: 2rem;
    border-radius: var(--radius);
    max-width: 500px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .modal-content h2 {
    color: var(--green-dark);
    margin-bottom: 1rem;
  }
  .modal-content p {
    color: var(--text-light);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .modal-buttons {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
  }

  .hidden { display: none !important; }

  /* ========== Export Layout Styles ========== */
  .export-document {
    max-width: 170mm;
    margin: 0 auto;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    font-size: 10pt;
    line-height: 1.6;
    color: #333;
    overflow: hidden;
    word-wrap: break-word;
    overflow-wrap: break-word;
    background: white;
  }
  .export-document .page-break { page-break-before: always; }

  /* Cover */
  .export-cover {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; min-height: 240mm; padding: 60px 0;
  }
  .cover-logo {
    width: 80px; height: 80px; background: var(--green-mid); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 28px; font-weight: bold; margin-bottom: 40px;
  }
  .cover-title { font-size: 28pt; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
  .cover-line { width: 80px; height: 3px; background: var(--accent); margin: 24px auto; border-radius: 2px; }
  .cover-subtitle { font-size: 16pt; color: var(--green-mid); font-weight: 600; margin-bottom: 4px; }
  .cover-meta { font-size: 10pt; color: #666; margin-top: 4px; line-height: 1.8; }
  .cover-footer { text-align: center; font-size: 8pt; color: #999; border-top: 1px solid #e0e0e0; padding-top: 12px; margin-top: 40px; }

  /* Page header/footer */
  .export-document .page-header {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 8px; border-bottom: 2px solid var(--green-pale);
    margin-bottom: 20px; font-size: 8pt; color: #999;
  }
  .export-document .page-header-logo { font-weight: 700; color: var(--green-mid); font-size: 9pt; }
  .export-document .page-footer {
    text-align: center; font-size: 8pt; color: #aaa;
    border-top: 1px solid #eee; padding-top: 6px; margin-top: 30px;
  }

  /* Section titles */
  .export-document .section-title {
    font-size: 16pt; color: var(--green-dark); margin-bottom: 4px;
    padding-bottom: 6px; border-bottom: 2px solid var(--green-mid); margin-top: 0;
  }
  .export-document .subsection-title {
    font-size: 12pt; color: var(--green-mid); margin-top: 20px; margin-bottom: 8px;
  }

  /* KV table (key-value, 2 cols) */
  .export-document .kv-table {
    width: 100%; border-collapse: collapse; margin: 8px 0 16px 0; font-size: 9pt;
  }
  .export-document .kv-table td {
    padding: 5px 10px; border-bottom: 1px solid #eee; vertical-align: top; border-left: none; border-right: none;
  }
  .export-document .kv-table td:first-child {
    width: 35%; font-weight: 600; color: var(--green-dark); background: #f8fdf9;
  }

  /* Data table */
  .export-document .data-table {
    width: 100%; border-collapse: collapse; margin: 10px 0 16px 0; table-layout: fixed; font-size: 9pt;
  }
  .export-document .data-table th {
    background: var(--green-bg); color: var(--green-dark); font-weight: 600;
    border: 1px solid var(--green-pale); padding: 6px 10px; text-align: left;
  }
  .export-document .data-table td {
    border: 1px solid #e0e0e0; padding: 6px 10px; word-wrap: break-word;
    overflow-wrap: break-word; vertical-align: top;
  }
  .export-document .data-table tr:nth-child(even) td { background: #fafafa; }
  .export-document .data-table .total-row td {
    font-weight: 700; background: var(--green-bg); border-top: 2px solid var(--green-mid);
  }

  /* Status badges */
  .export-document .status-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 8pt; font-weight: 600;
  }
  .export-document .status-badge.green { background: var(--green-bg); color: var(--green-dark); }
  .export-document .status-badge.orange { background: #fff3e0; color: #e65100; }
  .export-document .status-badge.blue { background: #e3f2fd; color: #1565c0; }

  /* Offerings grid */
  .export-document .offerings-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0 16px 0;
  }
  .export-document .offering-item {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: #f8fdf9; border: 1px solid var(--green-pale); border-radius: 4px; font-size: 9pt;
  }
  .export-document .offering-check { color: var(--green-mid); font-weight: bold; }

  /* Jahresplan 4x3 grid */
  .export-document .jahresplan-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 10px 0 16px 0;
  }
  .export-document .monat-cell {
    border: 1px solid #e0e0e0; border-radius: 4px; padding: 6px 8px; font-size: 8pt; min-height: 44px;
  }
  .export-document .monat-cell .monat-label {
    font-weight: 700; color: var(--green-mid); font-size: 7pt; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px;
  }

let lang = 'de';
let currentStep = 0;
const totalSteps = 11;

// Data structure with multi-project support
const data = {
  // Step 1: Basic info
  kvName: '', pfadiName: '', teamName: '', contact: '', email: '', teamSize: '',
  // Step 2
  status: '', challenges: '',
  // Step 3
  offerings: [], ownIdea: '',
  // Step 4
  people: '', hours: '', budget: '', infra: '', support: '',
  // Step 5
  plan: ['','','','','','','','','','','',''],
  // Multi-project support
  projects: [],
  currentProjectIdx: 0
};

// Color palette for Gantt responsibilities
const colorPalette = [
  '#40916c', '#52b788', '#f77f00', '#fcbf49',
  '#d62828', '#f77f00', '#2d6a4f', '#95b8d1'
];

const offeringKeys = [
  'cat_kurse','cat_fortbildung','cat_merkblatt','cat_aktivitaeten',
  'cat_auskunft','cat_heimcheck','cat_lager','cat_events',
  'cat_vernetzung','cat_lobby','cat_j_s'
];

function t(key) { return i18n[lang][key] || key; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderStep();
}

function renderProgress() {
  const pb = document.getElementById('progressBar');
  const names = t('stepNames');
  pb.innerHTML = Array.from({length:totalSteps}, (_, i) => `
    <div class="step-dot ${i === currentStep ? 'active' : ''} ${i < currentStep ? 'completed' : ''}">
      <div class="dot">${i+1}</div>
    </div>
    ${i < totalSteps - 1 ? `<div class="step-line ${i < currentStep ? 'done' : ''}"></div>` : ''}
  `).join('');
}

function renderProjectSelectorBar() {
  const bar = document.getElementById('projectSelectorBar');
  if (currentStep < 5) {
    bar.innerHTML = '';
    return;
  }

  const proj = getCurrentProject();
  bar.innerHTML = `
    <label>${t('s6_current')}</label>
    <select onchange="switchProject(parseInt(this.value))">
      ${data.projects.map((p, i) => `<option value="${i}" ${i === data.currentProjectIdx ? 'selected' : ''}>${p.name}</option>`).join('')}
    </select>
    <button class="btn btn-small btn-secondary" onclick="createNewProject()">${t('s6_new_project')}</button>
  `;
}

function switchProject(idx) {
  saveCurrentStep();
  data.currentProjectIdx = idx;
  renderStep();
}

function createNewProject() {
  const name = prompt(t('s6_project_name_prompt'), `Projekt ${data.projects.length + 1}`);
  if (!name) return;
  data.projects.push(createEmptyProject(name));
  data.currentProjectIdx = data.projects.length - 1;
  if (currentStep === 5) {
    renderStep();
  } else {
    renderProjectSelectorBar();
  }
}

function renderStep() {
  renderProgress();
  renderProjectSelectorBar();
  const main = document.getElementById('mainContent');
  switch(currentStep) {
    case 0: renderStep1(main); break;
    case 1: renderStep2(main); break;
    case 2: renderStep3(main); break;
    case 3: renderStep4(main); break;
    case 4: renderStep5(main); break;
    case 5: renderStep6(main); break;
    case 6: renderStep7(main); break;
    case 7: renderStep8(main); break;
    case 8: renderStep9(main); break;
    case 9: renderStep10(main); break;
    case 10: renderStep11(main); break;
  }
}

function nav(dir) {
  saveCurrentStep();
  currentStep = Math.max(0, Math.min(totalSteps-1, currentStep + dir));
  renderStep();
  window.scrollTo({top:0, behavior:'smooth'});
}

function saveCurrentStep() {
  switch(currentStep) {
    case 0:
      data.kvName = gv('kvName');
      data.pfadiName = gv('pfadiName');
      data.teamName = gv('teamName');
      data.contact = gv('contact');
      data.email = gv('email');
      data.teamSize = gv('teamSize');
      break;
    case 1:
      const sel = document.querySelector('.radio-item.selected input');
      data.status = sel ? sel.value : '';
      data.challenges = gv('challenges');
      break;
    case 2:
      data.offerings = [];
      document.querySelectorAll('.offering-cb:checked').forEach(cb => data.offerings.push(cb.value));
      data.ownIdea = gv('ownIdea');
      break;
    case 3:
      data.people = gv('people');
      data.hours = gv('hours');
      data.budget = gv('budget');
      data.infra = gv('infra');
      const sup = document.getElementById('support');
      data.support = sup ? sup.value : '';
      break;
    case 4:
      for (let i=0; i<12; i++) {
        const ta = document.getElementById('month_'+i);
        if(ta) data.plan[i] = ta.value;
      }
      break;
    case 6:
      saveProjectDescription();
      break;
    case 7:
      saveBudgetRows();
      break;
    case 8:
      saveGanttTasks();
      break;
    case 9:
      saveAufgabenRows();
      break;
  }
}

function gv(id) { const el=document.getElementById(id); return el?el.value:''; }

function getCurrentProject() {
  if (data.projects.length === 0) {
    data.projects.push(createEmptyProject('Projekt 1'));
    data.currentProjectIdx = 0;
  }
  return data.projects[data.currentProjectIdx];
}

function createEmptyProject(name) {
  return {
    id: 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    name: name,
    beschrieb: {
      projektName: '',
      projektZiel: '',
      zielgruppe: '',
      umfang: '',
      deliverables: '',
      risiken: '',
      kriterien: ''
    },
    budget: {
      rows: [
        {posten:'Material', beschreibung:'', betrag:''},
        {posten:'Verpflegung', beschreibung:'', betrag:''},
        {posten:'Transport', beschreibung:'', betrag:''},
        {posten:'Druck/Kopien', beschreibung:'', betrag:''},
        {posten:'Diverses', beschreibung:'', betrag:''}
      ],
      antragsteller: '',
      budgetDatum: '',
      genehmigung: ''
    },
    gantt: [
      {name: '', start: 1, end: 4, verantwortlich: ''},

}

function saveProjectDescription() {
  const proj = getCurrentProject();
  proj.beschrieb.projektName = gv('projektName');
  proj.beschrieb.projektZiel = gv('projektZiel');
  proj.beschrieb.zielgruppe = gv('zielgruppe');
  proj.beschrieb.umfang = gv('umfang');
  proj.beschrieb.deliverables = gv('deliverables');
  proj.beschrieb.risiken = gv('risiken');
  proj.beschrieb.kriterien = gv('kriterien');
}

function saveBudgetRows() {
  const proj = getCurrentProject();
  const rows = [];
  const trs = document.querySelectorAll('#budgetTable tbody tr');
  trs.forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    if (inputs.length >= 3) {
      rows.push({
        posten: inputs[0].value,
        beschreibung: inputs[1].value,
        betrag: inputs[2].value
      });
    }
  });
  proj.budget.rows = rows;
  proj.budget.antragsteller = gv('antragsteller');
  proj.budget.budgetDatum = gv('budgetDatum');
  proj.budget.genehmigung = gv('genehmigung');
  updateBudgetTotal();
}

function saveGanttTasks() {
  const proj = getCurrentProject();
  const tasks = [];
  const trs = document.querySelectorAll('#ganttTable tbody tr');
  trs.forEach(tr => {
    const inputs = tr.querySelectorAll('input, select');
    if (inputs.length >= 4) {
      tasks.push({
        name: inputs[0].value,
        verantwortlich: inputs[1].value,
        start: parseInt(inputs[2].value) || 1,
        end: parseInt(inputs[3].value) || 4
      });
    }
  });
  proj.gantt = tasks;
}

function saveAufgabenRows() {
  const proj = getCurrentProject();
  const aufgaben = [];
  const trs = document.querySelectorAll('#aufgabenTable tbody tr');
  trs.forEach(tr => {
    const inputs = tr.querySelectorAll('input, select');
    if (inputs.length >= 4) {
      aufgaben.push({
        aufgabe: inputs[0].value,
        verantwortlich: inputs[1].value,
        deadline: inputs[2].value,
        status: inputs[3].value
      });
    }
  });
  proj.aufgaben = aufgaben;
}

function setupDragDrop() {
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', chip.textContent);
    });
  });
}

function dragover(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
  e.dataTransfer.dropEffect = 'move';
}

function dragleave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dropOnMonth(e, monthIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const text = e.dataTransfer.getData('text/plain');
  const ta = document.getElementById('month_' + monthIdx);
  if (ta && text) {
    ta.value += (ta.value ? '\n' : '') + text;
  }
}

function calculateProjectCompletion(proj) {
  let completed = 0;
  if (proj.beschrieb.projektName) completed++;
  if (proj.beschrieb.projektZiel) completed++;
  if (proj.budget.rows.some(r => r.betrag)) completed++;
  if (proj.gantt.some(t => t.name)) completed++;
  return Math.floor((completed / 4) * 100);
}

function renderGanttVisual(tasks) {
  if (tasks.length === 0 || tasks.every(t => !t.name)) return '';

  const monthNames = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const weeksPerMonth = [4, 4, 4, 4, 4, 4, 4, 5, 4, 4, 4, 5];
  let weekToMonth = [];
  let currentMonth = 0;
  for (let i = 0; i < 52; i++) {
    if (i > 0 && weeksPerMonth[currentMonth] && i >= weeksPerMonth.slice(0, currentMonth+1).reduce((a,b)=>a+b,0)) {
      currentMonth++;
    }
    weekToMonth[i] = currentMonth;
  }

  let html = `<div class="gantt-container">
    <div class="gantt-chart">
      <div class="gantt-labels">
        <div style="height:40px; display:flex; align-items:center; font-weight:600; padding-right:1rem;">Aufgaben</div>
        ${tasks.map(task => `<div class="gantt-label">${task.name || '—'}</div>`).join('')}
      </div>
      <div class="gantt-bars">
        <div class="gantt-month-header">
          ${(() => {
            const monthStarts = [1, 5, 9, 13, 18, 22, 26, 31, 35, 39, 44, 48];
            const monthEnds =   [4, 8, 12, 17, 21, 25, 30, 34, 38, 43, 47, 52];
            return monthNames.map((name, i) =>
              `<div style="grid-column:${monthStarts[i]}/${monthEnds[i]+1}; text-align:center; font-weight:700; color:var(--green-dark); border-bottom:2px solid var(--green-pale); padding:4px 0;">${name}</div>`
            ).join('');
          })()}
        </div>
        ${tasks.map((task, idx) => {
          const uniquePersons = [...new Set(tasks.map(t => t.verantwortlich).filter(v => v))];
          const personIdx = uniquePersons.indexOf(task.verantwortlich);
          const color = colorPalette[personIdx >= 0 ? personIdx : idx % colorPalette.length];
          const barStart = Math.max(1, Math.min(52, task.start || 1));
          const barEnd = Math.max(barStart, Math.min(52, task.end || 4));
          const label = task.verantwortlich || '';

          return `
            <div class="gantt-row">
              <div class="gantt-bar" style="grid-column: ${barStart} / ${barEnd + 1}; background:${color};">${label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  </div>`;
  return html;
}

function exportICalendar() {
  const proj = getCurrentProject();
  const year = new Date().getFullYear();

  const events = proj.gantt
    .filter(t => t.name)
    .map(task => {
      const startWeek = Math.max(1, Math.min(52, task.start || 1));
      const endWeek = Math.max(startWeek, Math.min(52, task.end || 4));

      const startDate = getDateFromWeek(year, startWeek);
      const endDate = getDateFromWeek(year, endWeek + 1);

      const formatDate = (d) => d.toISOString().split('T')[0].replace(/-/g, '');

      return `BEGIN:VEVENT
UID:${proj.id}-${task.name.replace(/\s/g, '-')}-${Date.now()}@umwelt-wizard
DTSTAMP:${new Date().toISOString().split('.')[0].replace(/[-:]/g, '')}Z
DTSTART:${formatDate(startDate)}
DTEND:${formatDate(endDate)}
SUMMARY:${task.name}
DESCRIPTION:${proj.beschrieb.projektName || 'Projekt'}${task.verantwortlich ? ' - Verantwortlich: ' + task.verantwortlich : ''}
STATUS:CONFIRMED
END:VEVENT`;
    }).join('\n');

  const ical = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Umweltteam-Wizard//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:${proj.name}
X-WR-TIMEZONE:Europe/Zurich
${events}
END:VCALENDAR`;

  const blob = new Blob([ical], { type: 'text/calendar;charset=utf-8' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `umwelt-${proj.name.replace(/\s/g, '-')}-kalender.ics`;
  link.click();
}

function getDateFromWeek(year, week) {
  const simple = new Date(year, 0, 1 + (week - 1) * 7);
  const dow = simple.getDay();
  const ISOweekStart = simple;
  if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
  else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
  return ISOweekStart;
}

        <tr><td>${lang === 'de' ? 'Umweltteam' : 'Équipe environnement'}</td><td>${data.teamName}</td></tr>
        <tr><td>${lang === 'de' ? 'Kontaktperson' : 'Personne de contact'}</td><td>${data.contact}</td></tr>
        <tr><td>E-Mail</td><td>${data.email}</td></tr>
        <tr><td>${lang === 'de' ? 'Teamgrösse' : 'Taille de l\'équipe'}</td><td>${data.teamSize} ${lang === 'de' ? 'Personen' : 'personnes'}</td></tr>
      </table>

      <h1 class="section-title" style="margin-top:28px;">${lang === 'de' ? 'Standortbestimmung' : 'État des lieux'}</h1>
      <table class="kv-table">
        <tr><td>Status</td><td><span class="status-badge orange">${data.status}</span></td></tr>
        <tr><td>${lang === 'de' ? 'Herausforderungen' : 'Défis'}</td><td>${data.challenges}</td></tr>
      </table>

      <h1 class="section-title" style="margin-top:28px;">${lang === 'de' ? 'Ressourcen' : 'Ressources'}</h1>
      <table class="kv-table">
        <tr><td>${lang === 'de' ? 'Verfügbare Personen' : 'Personnes disponibles'}</td><td>${data.people}</td></tr>
        <tr><td>${lang === 'de' ? 'Stunden / Monat / Person' : 'Heures / mois / personne'}</td><td>${data.hours}</td></tr>
        <tr><td>${lang === 'de' ? 'Jährliches Budget' : 'Budget annuel'}</td><td>CHF ${data.budget}</td></tr>
        <tr><td>${lang === 'de' ? 'Infrastruktur' : 'Infrastructure'}</td><td>${data.infra}</td></tr>
        <tr><td>${lang === 'de' ? 'KV-Unterstützung' : 'Soutien AC'}</td><td>${data.support}</td></tr>
      </table>
      <div class="page-footer">Umweltteam-Wizard</div>
    </div>

    <!-- Page 3: Angebote & Jahresplan -->
    <div class="page-break">
      ${pageHeader}
      <h1 class="section-title">${lang === 'de' ? 'Gewählte Angebote' : 'Offres choisies'}</h1>
      <div class="offerings-grid">
        ${data.offerings.map(o => `<div class="offering-item"><span class="offering-check">✓</span> ${t(o)}</div>`).join('')}
        ${data.ownIdea ? `<div class="offering-item"><span class="offering-check">✓</span> ${data.ownIdea}</div>` : ''}
      </div>

      <h1 class="section-title" style="margin-top:24px;">${lang === 'de' ? 'Jahresplan' : 'Plan annuel'} ${year}</h1>
      <div class="jahresplan-grid">
        ${months.map((m, i) => `<div class="monat-cell"><div class="monat-label">${m}</div><div class="monat-content">${data.plan[i] || '—'}</div></div>`).join('')}
      </div>
      <div class="page-footer">Umweltteam-Wizard</div>
    </div>

    <!-- Project pages -->
    ${data.projects.map((p, idx) => `
      <div class="page-break">
        <div class="page-header"><span class="page-header-logo">Umweltteam-Plan</span><span>${data.kvName} · ${lang === 'de' ? 'Projekt' : 'Projet'} ${idx + 1}</span></div>
        ${generateProjectExportHTML(p)}
        <div class="page-footer">Umweltteam-Wizard</div>
      </div>
    `).join('')}
  `;

  return html;
}

function generateProjectExportHTML(proj) {
  let html = `<h1 class="section-title">${lang === 'de' ? 'Projekt' : 'Projet'}: ${proj.name}</h1>`;

  // Projektbeschrieb
  if (proj.beschrieb.projektZiel || proj.beschrieb.zielgruppe || proj.beschrieb.umfang) {
    html += `<h2 class="subsection-title">${lang === 'de' ? 'Projektbeschrieb' : 'Description du projet'}</h2><table class="kv-table">`;
    if (proj.beschrieb.projektZiel) html += `<tr><td>${lang === 'de' ? 'Projektziel' : 'Objectif'}</td><td>${proj.beschrieb.projektZiel}</td></tr>`;
    if (proj.beschrieb.zielgruppe) html += `<tr><td>${lang === 'de' ? 'Zielgruppe' : 'Public cible'}</td><td>${proj.beschrieb.zielgruppe}</td></tr>`;
    if (proj.beschrieb.umfang) html += `<tr><td>${lang === 'de' ? 'Umfang' : 'Envergure'}</td><td>${proj.beschrieb.umfang}</td></tr>`;
    if (proj.beschrieb.deliverables) html += `<tr><td>Deliverables</td><td>${proj.beschrieb.deliverables}</td></tr>`;
    if (proj.beschrieb.risiken) html += `<tr><td>${lang === 'de' ? 'Risiken' : 'Risques'}</td><td>${proj.beschrieb.risiken}</td></tr>`;
    if (proj.beschrieb.kriterien) html += `<tr><td>${lang === 'de' ? 'Erfolgskriterien' : 'Critères de réussite'}</td><td>${proj.beschrieb.kriterien}</td></tr>`;
    html += `</table>`;
  }

  // Budget
  const budgetTotal = proj.budget.rows.reduce((sum, r) => sum + (parseFloat(r.betrag) || 0), 0);
  html += `<h2 class="subsection-title">Budget</h2>
  <table class="data-table">
    <colgroup><col style="width:25%"><col style="width:45%"><col style="width:30%"></colgroup>
    <thead><tr><th>${lang === 'de' ? 'Posten' : 'Poste'}</th><th>${lang === 'de' ? 'Beschreibung' : 'Description'}</th><th>${lang === 'de' ? 'Betrag' : 'Montant'} (CHF)</th></tr></thead>
    <tbody>
      ${proj.budget.rows.map(r => `<tr><td>${r.posten}</td><td>${r.beschreibung}</td><td>${r.betrag}</td></tr>`).join('')}
      <tr class="total-row"><td colspan="2">Total</td><td>${budgetTotal.toFixed(2)}</td></tr>
    </tbody>
  </table>`;
  if (proj.budget.antragsteller || proj.budget.budgetDatum) {
    html += `<table class="kv-table" style="margin-top:4px;">`;
    if (proj.budget.antragsteller) html += `<tr><td>${lang === 'de' ? 'Antragsteller' : 'Demandeur'}</td><td>${proj.budget.antragsteller}</td></tr>`;
    if (proj.budget.budgetDatum) html += `<tr><td>${lang === 'de' ? 'Datum' : 'Date'}</td><td>${proj.budget.budgetDatum}</td></tr>`;
    html += `</table>`;
  }

  // Gantt with visual bars
  const validGantt = proj.gantt.filter(g => g.name);
  if (validGantt.length > 0) {
    const uniquePersons = [...new Set(validGantt.map(g => g.verantwortlich).filter(v => v))];
    const ganttColors = ['#40916c', '#f77f00', '#7b2cbf', '#2196f3', '#d62828', '#52b788', '#fcbf49', '#95b8d1'];

    html += `<h2 class="subsection-title">${lang === 'de' ? 'Zeitplan (Gantt-Übersicht)' : 'Calendrier (aperçu Gantt)'}</h2>
    <table class="data-table" style="font-size:8pt;">
      <colgroup><col style="width:22%"><col style="width:18%"><col style="width:8%"><col style="width:8%"><col style="width:44%"></colgroup>
      <thead><tr>
        <th>${lang === 'de' ? 'Aufgabe' : 'Tâche'}</th>
        <th>${lang === 'de' ? 'Verantwortlich' : 'Responsable'}</th>
        <th>${lang === 'de' ? 'Start' : 'Début'}</th>
        <th>${lang === 'de' ? 'Ende' : 'Fin'}</th>
        <th><div style="display:flex; justify-content:space-between; font-size:7pt; color:#888;"><span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span></div></th>
      </tr></thead>
      <tbody>
        ${validGantt.map(g => {
          const start = Math.max(1, Math.min(52, g.start || 1));
          const end = Math.max(start, Math.min(52, g.end || 4));
          const pIdx = uniquePersons.indexOf(g.verantwortlich);
          const color = ganttColors[pIdx >= 0 ? pIdx % ganttColors.length : 0];
          const marginPct = ((start - 1) / 52 * 100).toFixed(1);
          const widthPct = ((end - start + 1) / 52 * 100).toFixed(1);
          return `<tr>
            <td>${g.name}</td>
            <td>${g.verantwortlich}</td>
            <td>KW ${start}</td>
            <td>KW ${end}</td>
            <td class="bar-cell"><div style="margin-left:${marginPct}%; width:${widthPct}%;"><div class="gantt-bar-visual" style="background:${color};" title="KW ${start}–${end}"></div></div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

    if (uniquePersons.length > 0) {
      html += `<div class="gantt-legend">`;
      uniquePersons.forEach((person, idx) => {
        html += `<span><span class="gantt-legend-dot" style="background:${ganttColors[idx % ganttColors.length]};"></span>${person}</span>`;
      });
      html += `</div>`;
    }
  }

  // Aufgaben-Tracker with status badges
  const validAufgaben = proj.aufgaben.filter(a => a.aufgabe);
  if (validAufgaben.length > 0) {
    html += `<h2 class="subsection-title">${lang === 'de' ? 'Aufgaben-Tracker' : 'Suivi des tâches'}</h2>
    <table class="data-table">
      <colgroup><col style="width:30%"><col style="width:22%"><col style="width:20%"><col style="width:28%"></colgroup>
      <thead><tr>
        <th>${lang === 'de' ? 'Aufgabe' : 'Tâche'}</th>
        <th>${lang === 'de' ? 'Verantwortlich' : 'Responsable'}</th>
        <th>Deadline</th>
        <th>Status</th>
      </tr></thead>
      <tbody>
        ${validAufgaben.map(a => {
          const statusText = t(a.status);
          let badgeClass = 'blue';
          if (a.status === 'done') badgeClass = 'green';
          else if (a.status === 'inprogress') badgeClass = 'orange';
          return `<tr><td>${a.aufgabe}</td><td>${a.verantwortlich}</td><td>${a.deadline}</td><td><span class="status-badge ${badgeClass}">${statusText}</span></td></tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  return html;
}

function generateFilename(exportType, ext) {
  const date = new Date().toISOString().split('T')[0];
  if (exportType === 'all') {
    return `umwelt-${data.kvName.replace(/\s/g, '-')}-${date}.${ext}`;
  } else {
    const idx = parseInt(exportType.split('_')[1]);
    return `umwelt-${data.projects[idx].name.replace(/\s/g, '-')}-${date}.${ext}`;
  }
}

function stripHtml(html) {
  const tmp = document.createElement('DIV');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function restartWizard() {
  const msg = lang === 'de'
    ? 'Wirklich neu starten? Alle Daten gehen verloren (es sei denn, Sie haben gespeichert).'
    : 'Vraiment recommencer ? Toutes les données seront perdues (sauf si vous avez enregistré).';

  if (confirm(msg)) {
    localStorage.clear();
    location.reload();
  }
}

function exportSingleProject(idx) {
  const proj = data.projects[idx];
  const exportType = `project_${idx}`;
  document.getElementById('exportType').value = exportType;
  exportPDF();
}

// Save/Load functionality
function exportData() {
  saveCurrentStep();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `umweltteam-${data.kvName.replace(/\s/g, '-') || 'backup'}.json`;
  link.click();

  alert(t('save_success'));
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);

      showModal(
        lang === 'de' ? 'Daten laden' : 'Charger les données',
        lang === 'de'
          ? 'Möchten Sie die importierten Daten laden? Die aktuellen Daten werden überschrieben.'
          : 'Voulez-vous charger les données importées ? Les données actuelles seront écrasées.',
        () => {
          Object.assign(data, imported);
          currentStep = 0;
          renderStep();
          alert(t('load_success'));
        }
      );
    } catch (err) {
      alert(lang === 'de' ? 'Fehler beim Laden der Datei.' : 'Erreur lors du chargement du fichier.');
    }
  };
  reader.readAsText(file);
}

function showModal(title, text, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  modalCallback = onConfirm;
  document.getElementById('confirmModal').classList.add('active');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('active');
  modalCallback = null;
}

function confirmModalAction() {
  if (modalCallback) {
    modalCallback();
  }
  closeModal();
}

let modalCallback = null;

// Initialize
renderStep();
</script>
